# Netlify configuration for H & A Hampers
# Static site lives in /public; serverless functions in /netlify/functions.
# Publishing only /public keeps node_modules, source & config out of the web root.

[build]
  command = ""          # no build step — static HTML
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Security headers for the whole site
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; form-action 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none'"

# Cache-bust the dashboard, keep it out of search engines, and forbid framing
[[headers]]
  for = "/dashboard/*"
  [headers.values]
    Cache-Control = "no-cache"
    X-Robots-Tag = "noindex"
    X-Frame-Options = "DENY"
